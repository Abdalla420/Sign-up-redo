<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="whole-container">
        <div class="left-container">
            <div class="logo-container">
                <img src="./logo-icon.png" alt="The Odin Project Logo" id="logo-icon">
                <p id="logo-text">ODIN</p>
            </div>
            <p class="credit">Photo by <u>Halie West</u>  on 
                <a id="link" href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a>
            </p>
        </div>
        <div class="right-container">
            <section class="paragraph">
                <p class="big-text">This is not a real online service!
                     You know you need something like this in your life
                      to help you realize your deepest dreams. Sign up <i>now</i> to get started.
                </p>
                <p class="subtext">You <i>know</i> you want to.</p>
            </section>
            <div class="form-container">
                <p class="form-title">Let's do this!</p>
                <form action="#" method="get" class="form">
                    <div class="form-group">
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" name="first-name" id="first-name">
                    </div>
                    <div class="form-group">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" name="last-name" id="last-name">
                    </div>
                    <div class="form-group">
                        <label for="email">EMAIL</label>
                        <input typse="email" name="email" id="email">
                    </div>
                    <div class="form-group">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" name="phone" id="phone">
                    </div>
                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div class="form-group">
                        <label for="c-password">CONFIRM PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>
                </form>
            </div>
            <button type="submit"></button>
            <p></p>
        </div>
    </div>
</body>
</html>
